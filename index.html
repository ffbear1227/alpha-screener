<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alpha Screen</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/100/40C057/bullish.png">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-950 text-slate-100 font-sans select-none pb-12">

    <header class="pt-12 pb-4 px-6 border-b border-neutral-800 flex justify-between items-center sticky top-0 bg-neutral-950/90 backdrop-blur-md z-50">
        <div>
            <h1 class="text-xl font-black tracking-wider text-emerald-400">ALPHA <span class="text-white font-light">SCREEN</span></h1>
            <p id="update-time" class="text-xs text-neutral-500 mt-0.5">狀態: 正在建立安全連線...</p>
        </div>
        <button id="refresh-btn" onclick="fetchData()" class="bg-neutral-900 border border-neutral-700 px-3.5 py-1.5 rounded-full text-xs font-semibold active:scale-95 transition-all">
            重新整理
        </button>
    </header>

    <main id="stock-list" class="p-6 space-y-4">
        <div class="animate-pulse flex space-x-4 p-5 rounded-2xl bg-neutral-900 border border-neutral-800">
            <div class="flex-1 space-y-2.5 py-1">
                <div class="h-4 bg-neutral-800 rounded w-2/3"></div>
                <div class="h-3 bg-neutral-800 rounded w-1/3"></div>
            </div>
        </div>
    </main>

    <script>
        // 1. 綁死絕對網址，徹底根絕尾部斜線解析錯誤
        const DATA_URL = 'https://ffbear1227.github.io/alpha-screener/results.json';

        async function fetchData() {
            const btn = document.getElementById('refresh-btn');
            const list = document.getElementById('stock-list');
            const timeLabel = document.getElementById('update-time');

            btn.innerText = "讀取中...";
            btn.disabled = true;

            try {
                // 產生隨機參數強制破除 CDN 快取
                const buster = Date.now() + '_' + Math.random().toString(36).substr(2, 4);
                const response = await fetch(`${DATA_URL}?v=${buster}`, { cache: 'no-store' });

                if (!response.ok) {
                    throw new Error(`伺服器連線失敗 (HTTP ${response.status})`);
                }

                const rawText = await response.text();
                let data;
                try {
                    data = JSON.parse(rawText);
                } catch (parseError) {
                    throw new Error(`數據格式損毀，伺服器回傳了非 JSON 文字`);
                }

                timeLabel.innerText = `最後更新: ${data.update_time || '未知時間'}`;
                list.innerHTML = '';

                // 渲染遭門神封鎖板塊 (相容性寫法：確定有該屬性才渲染)
                if (data.blocked_count > 0 && Array.isArray(data.blocked_sectors)) {
                    list.innerHTML += `
                        <div class="px-4 py-3 rounded-xl bg-rose-500/10 border border-rose-500/20 text-rose-400 text-xs flex flex-col gap-1 shadow-inner">
                            <span class="font-bold flex items-center">🛡️ 本期遭門神封鎖板塊：</span>
                            <span class="font-mono text-[11px] opacity-90 leading-relaxed">${data.blocked_sectors.join(', ')}</span>
                        </div>
                    `;
                }

                // 若清單為空
                if (data.count === 0 || !data.data || data.data.length === 0) {
                    list.innerHTML = `
                        <div class="text-center py-20 border border-dashed border-neutral-800 rounded-2xl mt-4">
                            <div class="text-neutral-500 font-light text-sm">當前盤中時段無標的觸發策略</div>
                            <div class="text-[10px] text-neutral-600 mt-1 font-mono">System Engine checked</div>
                        </div>
                    `;
                    return;
                }

                // 2. 終極相容性遍歷：同時支援 V1 舊版 與 V2 新版 JSON 結構
                data.data.forEach(item => {
                    const symbol = item.symbol || 'N/A';
                    const price = item.price !== undefined ? `$${item.price}` : 'N/A';
                    const rvol = item.rvol !== undefined ? `${item.rvol}x` : 'N/A';
                    const sector = item.sector || '未分類';

                    // 容錯機制：如果讀不到新版屬性，給予預設外殼，絕不報錯當機
                    const proxy = item.proxy || 'SYS';
                    const signal = item.signal || '⚡ 動能選股';
                    const gate = item.gate || '系統放行';

                    const isHigh = signal.includes('創高');
                    const badgeClass = isHigh
                        ? 'bg-rose-500/10 text-rose-400 border-rose-500/20'
                        : 'bg-amber-400/10 text-amber-400 border-amber-400/20';

                    list.innerHTML += `
                        <div class="p-5 rounded-2xl bg-neutral-900/80 border border-neutral-800 flex items-center justify-between shadow-xl backdrop-blur-sm active:scale-[0.99] transition-transform">
                            <div class="flex items-center space-x-3.5">
                                <div class="w-12 h-12 rounded-xl bg-neutral-800/80 border border-neutral-700/50 flex flex-col items-center justify-center shrink-0">
                                    <span class="text-[9px] text-neutral-400 font-mono">PROXY</span>
                                    <span class="text-xs font-bold text-emerald-400 font-mono">${proxy}</span>
                                </div>
                                <div class="space-y-0.5">
                                    <div class="flex items-center space-x-2">
                                        <h2 class="text-xl font-black tracking-tight text-white">${symbol}</h2>
                                        <span class="text-[10px] px-1.5 py-0.5 rounded font-bold border ${badgeClass}">
                                            ${signal}
                                        </span>
                                    </div>
                                    <div class="text-xs text-neutral-400 flex items-center space-x-1.5 font-light">
                                        <span>${sector}</span>
                                        <span>•</span>
                                        <span class="text-[10px] text-neutral-500 font-mono">放行:${gate}</span>
                                    </div>
                                </div>
                            </div>
                            <div class="text-right shrink-0">
                                <div class="text-lg font-mono font-bold text-white">${price}</div>
                                <div class="text-[10px] font-mono text-amber-400/90 font-semibold mt-1">
                                    RVOL ${rvol}
                                </div>
                            </div>
                        </div>
                    `;
                });

            } catch (err) {
                // 3. 內建終端機：把錯誤代碼直接印在網頁上
                timeLabel.innerText = "渲染核心崩潰";
                list.innerHTML = `
                    <div class="p-5 bg-red-500/10 border border-red-500/20 rounded-2xl text-red-400 space-y-1.5">
                        <div class="font-bold text-xs flex items-center">⚠️ 前端執行期例外報錯 (Exception)：</div>
                        <div class="font-mono text-xs break-all bg-black/40 p-2.5 rounded-lg border border-red-500/30">${err.message}</div>
                        <div class="text-[10px] text-neutral-500 pt-1">請截圖此區塊回傳給系統架構師</div>
                    </div>
                `;
            } finally {
                btn.innerText = "重新整理";
                btn.disabled = false;
            }
        }

        fetchData();
    </script>
</body>
</html>
