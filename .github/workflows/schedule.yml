name: US Stock Screener Bot

on:
  workflow_dispatch:
  schedule:
    - cron: '30 12 * * 1-5'
    - cron: '0 14 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '0 19 * * 1-5'

jobs:
  run-screener:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4  # 從 v3 升級到 v4

    - name: Set up Python
      uses: actions/setup-python@v5  # 從 v4 升級到 v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install yfinance pandas requests

    - name: Run Screener
      env:
        TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
      run: python screener.py

    - name: Commit and Push JSON
      run: |
        git config --global user.name "Screener-Bot"
        git config --global user.email "bot@screener.local"
        git add results.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "update screener data" && git push)